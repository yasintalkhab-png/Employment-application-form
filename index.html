<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employment Application Form</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Vazirmatn",sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#6a11cb,#2575fc);
    padding:40px;
}

form{
    width:700px;
    max-width:95%;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.2);
    border-radius:25px;
    padding:40px;
    box-shadow:0 15px 35px rgba(0,0,0,.2);
    color:white;
}

label,
legend{
    font-weight:600;
    display:block;
    margin-bottom:8px;
}

input:not([type="radio"]):not([type="checkbox"]):not([type="submit"]):not([type="reset"]),
select,
textarea{
    width:100%;
    padding:14px 18px;
    border:none;
    border-radius:14px;
    background:rgba(255,255,255,.2);
    color:white;
    font-size:15px;
    outline:none;
    transition:.3s;
}

input::placeholder,
textarea::placeholder{
    color:rgba(255,255,255,.75);
}

input:focus,
textarea:focus,
select:focus{
    background:rgba(255,255,255,.3);
    box-shadow:0 0 15px rgba(255,255,255,.35);
    transform:scale(1.02);
}

fieldset{
    border:2px solid rgba(255,255,255,.35);
    border-radius:15px;
    padding:18px;
}

fieldset label{
    display:inline;
    margin-left:8px;
    margin-right:20px;
}

input[type="radio"],
input[type="checkbox"]{
    transform:scale(1.2);
    accent-color:#00ffd5;
    cursor:pointer;
}

input[type="file"]{
    width:100%;
    padding:10px;
    border-radius:12px;
    background:rgba(255,255,255,.15);
    cursor:pointer;
}

input[type="range"]{
    width:100%;
    accent-color:#00ffd5;
}

textarea{
    resize:none;
}

input[type="submit"],
input[type="reset"]{
    border:none;
    padding:14px 28px;
    border-radius:14px;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:.3s;
    margin-left:10px;
}

input[type="submit"]{
    background:#00ffd5;
    color:#222;
}

input[type="submit"]:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 20px rgba(0,255,213,.45);
}

input[type="reset"]{
    background:#ff4d6d;
    color:white;
}

input[type="reset"]:hover{
    transform:translateY(-4px);
    box-shadow:0 10px 20px rgba(255,77,109,.4);
}

br{
    display:none;
}

form>*{
    margin-bottom:20px;
}

@media(max-width:768px){

    form{
        padding:25px;
    }

    input[type="submit"],
    input[type="reset"]{
        width:100%;
        margin-bottom:12px;
    }
}

    h1{
    text-align:center;
    font-size:2.4rem;
    font-weight:700;
    margin-bottom:12px;

    background:linear-gradient(90deg,#00ffd5,#ffffff,#8a7dff);

    background-clip:text;          /* نسخه استاندارد */
    -webkit-background-clip:text;  /* برای Chrome و Safari */

    color:transparent;
    -webkit-text-fill-color:transparent;
}

p{
    text-align:center;
    color:rgba(255,255,255,.85);
    margin-bottom:35px;
    font-size:1.05rem;
}
    </style>
</head>
<body>
    <h1>فرم استخدام</h1>
<p>لطفاً فرم زیر را تکمیل کنید. پس از بررسی اطلاعات، در صورت تأیید با شما تماس خواهیم گرفت.</p>
    <form>
        
        <label for="first-name">نام</label>
        <input type="text" placeholder="نام خود را وارد کنید" name="first-name" id="first-name" required/>
        <br />
        <br />
        
        
        <label for="last-name">نام خانوادگی</label>
        <input type="text" placeholder="نام خانوادگی خود را وارد کنید" name="last-name" id="last-name" required/>
        
        <br />
        <br />
        
        <label for="">تاریخ تولد</label>
        <input type="date" placeholder="تاریخ تولد خود را وارد کنید" name="" id="" required>
        
        <br>
        <br />
        
        <fieldset>
            <legend>جنسیت</legend>
            <label for="male">مرد</label>
            <input type="radio" name="gender" id="male" required>
            <label for="female">زن</label>
            <input type="radio" name="gender" id="female" required>
        </fieldset>

        <br />
        <br />

        <label for="gmail">ایمیل</label>
        <input type="email" placeholder="ایمیل خود را وارد کنید" name="" id="gmail" required>
        
        <br />
        <br />
        
        <label for="addres">ادرس اینترنتی شرکت</label>
        <input type="url" placeholder="آدرس اینترنتی خود را وارد کنید" name="" id="addres">
        
        <br />
        <br />
        
        
        <select name="" id="" required>
            <option value="0">مدرک تحصیلی</option>
            <option value="diplom">دیپلم</option>
            <option value="karshenasi">کارشناسی</option>
            <option value="karshenasi-arshad">کارشناسی ارشد</option>
            <option value="doctora">دکترا</option>
            <option value="fogh-doctora">فوق دکترایی</option>
        </select>
        
        <br />
        <br />
        
        <input type="text" placeholder="سرگرمی معمول خود را انتخاب کنید" name="" list="list" id="">
        <datalist id="list">
            <option value="1">باغبانی</option>
            <option value="2">کتاب خواندن</option>
            <option value="3">نویسندگی</option>
            <option value="4">برنامه نویسی</option>
            
        </datalist>
        <br>
        <br>
        <br>
        
        <br />
        <label for="newsletter">ایا مایلید اخبار برای شما از طریق ایمیل ارسال شود</label>
        <input type="checkbox" name="newsletter" id="newsletter">
        
        <br />
        <br />
        
        <textarea name="" placeholder="نظرات خود را اینجا وارد کنید" id="" rows="15" cols="45"></textarea>
        
        <br />
        <br /> 
        
        <input type="submit" value="ارسال">
        <input type="reset" value="حذف اطلاعات">
    
    </form>
</body>
</html>
