<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>فرم استخدام</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

        
        <form id="jobForm">
                <h1>فرم استخدامی</h1>
                <p>لطفا فرم زیر را پر کنید تا پس از بررسی آن با شما تماس گرفته شد</p>
                
        <label for="first-name">نام</label>
        <input type="text" placeholder="نام خود را وارد کنید" name="first-name" id="first-name" required>

        <br><br>

        <label for="last-name">نام خانوادگی</label>
        <input type="text" placeholder="نام خانوادگی خود را وارد کنید" name="last-name" id="last-name" required>

        <br><br>

        <label for="national-id">کد ملی</label>
<input
    type="text"
    id="national-id"
    name="national-id"
    placeholder="کد ملی خود را وارد کنید"
    maxlength="10"
    minlength="10"
    pattern="[0-9]{10}"
    required
>

        <label>تاریخ تولد</label>
        <input type="date" id="birthdate" required>

        <br><br>

        <fieldset>
            <legend>جنسیت</legend>

            <label for="male">مرد</label>
            <input type="radio" name="gender" id="male" required>

            <label for="female">زن</label>
            <input type="radio" name="gender" id="female" required>
        </fieldset>

        <br><br>

        <label for="gmail">ایمیل</label>
        <input type="email" id="gmail" placeholder="ایمیل خود را وارد کنید" required>

        <br><br>

        <label for="phone">تلفن همراه</label>
<input
    type="text"
    id="phone"
    name="phone"
    placeholder=" شماره تلفن همراه خود را وارد کنید"
    maxlength="10"
    minlength="10"
    pattern="[0-9]{10}"
    required
>

        <label for="address">آدرس اینترنتی شرکت</label>
        <input type="url" id="address" placeholder="آدرس اینترنتی خود را وارد کنید">

        <br><br>

        <select id="degree" required>
            <option value="">مدرک تحصیلی</option>
            <option value="diplom">دیپلم</option>
            <option value="karshenasi">کارشناسی</option>
            <option value="karshenasi-arshad">کارشناسی ارشد</option>
            <option value="doctora">دکترا</option>
            <option value="fogh-doctora">فوق دکترا</option>
        </select>

        <br><br>

        <input type="text" list="list" placeholder="سرگرمی معمول خود را انتخاب کنید">

        <datalist id="list">
            <option value="باغبانی">
            <option value="کتاب خواندن">
            <option value="نویسندگی">
            <option value="برنامه نویسی">
        </datalist>

        <br><br>

        <label for="newsletter">
            آیا مایلید اخبار برای شما از طریق ایمیل ارسال شود؟
        </label>

        <input type="checkbox" id="newsletter">

     

        <br><br>

        <textarea id="description" rows="15" cols="45" placeholder="نظرات خود را اینجا وارد کنید"></textarea>

        <br><br>

        <input type="submit" value="ارسال">
        <input type="reset" value="حذف اطلاعات">

    </form>
<script src="script.js"></script>
</body>
</html>
